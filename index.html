<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import "tailwindcss";
        body{
            font-family: 'Tahoma','Vazir',system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;

        }
    </style>
    
</head>
<body class="bg-linear-to-br  from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-6 md:p-8 transition-all">
        <h1 class="text-3xl font-bold text-center text-indigo-700 mb-2">Bmi CalCulator</h1>
        <p class="text-center text-gray-500 mb-6">Body Mass Index</p>
        <div class="space-y-5">
            <!--weight-->
            <div>
                <label for="weight" class=" block text-gray-700 font-medium mb-2" >Weight:</label>
                <input type="number" id="weight" placeholder="For Example 56"
                 class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 outline-none transition">
            </div>
            <!--height-->
            <div>
                <label for="height" class="block text-gray-700 font-medium mb-2">Height:</label>
                <input type="number" id="height" placeholder="For Example 160"
                 class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 outline-none transition">
            </div>
            <button id="calculation" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl transition duration-200 shadow-md hover:shadow-lg">Calc</button>
        </div>
        <!--calc show-->
        <div id="resultContainer" class="mt-8 p-4 rounded-xl bg-gray-50 text-center hidden">
            <p class="text-gray-600 mb-1">Result:</p>
            <p id="bmiValue" class="text-4xl font-extrabold text-indigo-800">--</p>
            <p id="bmiStatus" class="text-md mt-2 font-medium"></p>
        </div>
        <!--Error M-->
        <div id="errorMsg" class="mt-4 text-red-500 text-sm text-center hidden"></div>
    </div>
    
</body>
</html>
