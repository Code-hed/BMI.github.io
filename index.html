<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced BMI Calc</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <script src="main.js" defer></script>
    <link rel="stylesheet" href="src/output.css">
    <style>
        @import "tailwindcss";
        body{
            transition: background-color 0.2s ease;
            background: linear-gradient(135deg,#679ce7 0%,#03377f 100%);

        }
        .fade-in {animation: fadeIn 0.3s ease-in-out;}
        @keyframes fadeIN {
            from{opacity: 0;transform: translateY(10px);}
            to{opacity: 1;transform: translateY(0);}
        }
        .bmi-progress{
            background: linear-gradient(to right,#3b82f6,#22c55e,#eab308,#f97316,#ef4444);
            border-radius: 1rem;
            height: 12px;
            width: 100%;
        }
        .bmi-marker{
            position: relative;
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 10px solid #1f2937;
            transform: translateX(-6px);
        }
    </style>
    
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <!--main Card-->
    <div class="w-full max-w-lg mx-auto bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-6 transition-colors duration-200">
        <!--Header and change metric-->
        <div class="flex justify-between items-center mb-4">
          <h1 class="text-2xl font-bold text-gray-800 dark:text-white">
            <i class="fas fa-heartbeat text-indigo-500 mr-2"></i>Bmi Advanced
          </h1>
          <button id="unitToggle" class="px-3 py-1 rounded-full text-sm font-semibold transition bg-indigo-600 hover:bg-indigo-700 text-white shadow">
            <i class="fas fa-exchange-alt mr-1"></i><span id="unitLabel">Metric</span>
          </button>
        </div>
        <div class="space-y-5">
            <!--weight-->
            <div>
                <label for="weight" class=" block text-sm text-gray-700 font-medium mb-1 dark:text-gray-300" ><i class="fas fa-weight-scale mr-1"></i>Weight:</label>
                <div class="flex gap-2">
                <input type="number" id="weight" placeholder="70" class="flex-1 px-4 py-2 rounded-xl outline-none border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-900 dark:text-white focus:ring-2 focus:ring-indigo-400 ">
                <span id="weightUnit" class="px-3 py-2 bg-gray-200 dark:bg-gray-700 rounded-xl dark:text-white">Kg</span>
                </div>
            </div>
            <!--height-->
            <div>
                <label for="height" class=" block text-sm text-gray-700 font-medium mb-1 dark:text-gray-300" ><i class="fas fa-weight-scale mr-1"></i>Weight:</label>
                <div class="flex gap-2">
                <input type="number" id="height" placeholder="70" class="flex-1 px-4 py-2 rounded-xl outline-none border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-900 dark:text-white focus:ring-2 focus:ring-indigo-400 ">
                <span id="heightUnit" class="px-3 py-2 bg-gray-200 dark:bg-gray-700 rounded-xl dark:text-white">Cm</span>
                </div>
            </div>
            <!--Age and Gender-->
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">Age</label>
                    <input type="number" id="age" placeholder="30" value="30" class="w-full px-4 py-2 rounded-xl outline-none border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-900 dark:text-white focus:ring-2 focus:ring-indigo-400">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">Gender</label>
                    <select id="gender" class="w-full px-4 py-2 rounded-xl outline-none border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-900 text-gray-900 dark:text-white">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
            </div>
            <button id="calcBtn" class="w-full py-3 rounded-xl font-bold transition active:scale-95 flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white shadow-md">
                <i class="fas fa-calculator"></i>Calc
            </button>
        </div>
        <!--calc show-->
        <div id="resultContainer" class="mt-8 p-4 rounded-xl bg-gray-50 dark:bg-gray-900 text-center  fade-in">
            <div class="text-center">
            <p class="text-sm text-gray-500 dark:text-gray-400">Your BMI:</p>
            <p id="bmiValue" class="text-4xl font-extrabold text-gray-800 dark:text-white">--</p>
            <p id="bmiStatus" class="text-lg mt-1 font-semibold"></p>
            </div>

            <!--Bmi Progress Bar-->
            <div class="mt-4 relative">
                <div class="bmi-progress"></div>
                <div id="bmiMarker" class="bmi-marker absolute top-0" style="left:0%"></div>
            </div>
            <div class="flex justify-between text-xs mt-1 px-1  text-gray-500 dark:text-gray-400">
                <span>Underweight</span>
                <span>Normal</span>
                <span>Overweight</span>
                <span>Obese</span>
            </div>
            <!--Detailed Info-->
            <div class="mt-4 grid grid-cols-2 gap-2 text-sm">
                <div class="p-2 rounded-lg bg-gray-100 dark:bg-gray-800">
                    <p class="text-xs text-gray-500 dark:text-gray-400">Healthy weight Range</p>
                    <p id="healthyRange" class="font-bold text-gray-800 dark:text-white">-</p>
                </div>
                <div class="p-2 rounded-lg bg-gray-100 dark:bg-gray-800">
                    <p class="text-xs text-gray-500 dark:text-gray-400">Est. Body Fat</p>
                    <p id="bodyFat" class="font-bold text-gray-800 dark:text-white">-</p>
                </div>
            </div>
            <!--Action Buttons -->
            <div class="flex gap-2 mt-4"> 
                <button id="shareBtn" class="flex-1 py-2 rounded-lg text-sm font-medium transition flex items-center justify-center gap-1 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-600">
                    <i class="fas fa-share-alt"></i>Share
                </button>
                <button id="saveHistoryBtn" class="flex-1 py-2 rounded-lg text-sm font-medium transition flex items-center justify-center gap-1 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-white hover:bg-gray-300 dark:hover:bg-gray-600">
                    <i class="fas fa-save"></i>Save to History
                </button>
            </div>
        </div>
        <!--Error M-->
        <div id="errorMsg" class="mt-4 text-red-500 text-sm text-center hidden"></div>

        <!--History section -->
        <div id="historySection" class="mt-6 pt-2 border-t border-gray-200 dark:border-gray-700">
            <div class="flex justify-between items-center mb-2">
                <h3 class=" font-semibold text-gray-700 dark:text-gray-300":><i class="fas fa-history mr-1"></i>Recent History</h3>
                <button id="clearHistoryBtn" class="text-xs px-2 py-1 rounded-full bg-red-100 dark:bg-red-900 text-red-600 dark:text-red-300 hover:bg-red-200">Clear All </button>
            </div>
            <div id="historyList" class="space-y-2 max-h-48 overflow-y-auto">
                <p class="text-sm text-center text-gray-400 dark:text-gray-500">No History</p>
            </div>
        </div>
    </div>
    
</body>
</html>
